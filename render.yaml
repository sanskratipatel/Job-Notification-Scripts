services:
  - type: web
    name: job-notifier
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: GMAIL_USER
        value: patelsanskrati05@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CHECK_INTERVAL_HOURS
        value: "2"
